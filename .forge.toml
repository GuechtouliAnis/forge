# .forge.toml — Forge project configuration
# Place at .forge.toml in your project root.
# All sections and keys are optional unless marked (required).
# If value is empty, forge falls back to default value


# ——— ENV ——————————————————————————————————————————————————————————————————————
[env]
# Default .env file path, relative to project root.
default_file = ".env"

# Default .env.example file path, relative to project root.
example_file = ".env.example"


# ——— ENV ADD ——————————————————————————————————————————————————————————————————
[env.add]
# Line ending style for appended keys.
# Values: "lf" | "crlf"
line_ending = "lf"


# ——— ENV CHECK ————————————————————————————————————————————————————————————————
[env.check]

# Minimum severity level to report. "warn" reports everything, "error" reports errors only.
# Values: "warn" | "error"
check_level = "warn"

# Keys to skip entirely during all checks, including conformity diff.
ignore_keys = ["AAA"]

# Suppress specific check categories globally.
# Valid codes: "empty_value", "trailing_whitespace", "consecutive_blank_lines",
#              "commented_key_has_value", "example_conformity", "example_has_value",
#              "file_ends_with_blank", "lowercase_key"
ignore_codes = ["example_conformity", "lowercase_key"]

# Keys that must exist in .env — Forge errors if any are missing.
required_keys = []

# Lowercase keys to allow without warning — e.g. ["version", "env"].
allowed_lowercase = ["Aniss"]

# Maximum number of consecutive blank lines allowed.
# Set to 0 to disable.
max_consecutive_blanks = 2


# ——— GIT CLEAN ———————————————————————————————————————————————————————————————
[git.clean]
# Days since last commit before a branch is considered dusty.
# Set to 0 to disable age-based detection.
stale_days = 30

# How many commits behind base before a branch is considered dusty.
# Set to 0 to disable behind-count detection.
commits_behind = 10


# ——— GIT COMMIT ——————————————————————————————————————————————————————————————
[git.commit]
# Commit message format template. Use {domain} and {message} as placeholders.
# Set to "" to disable format enforcement (message is used as-is).
format = "[{domain}] {message}"

# Allowed domain prefixes for commit messages.
# Set to [""] to disable domain enforcement (useful when format omits {domain}).
domain = [
    "FEAT",   # New feature
    "FIX",    # Bug fix
    "REFACT", # Refactoring (no behaviour change)
    "DOCS",   # Documentation
    "TEST",   # Tests
    "CHORE",  # Maintenance (deps, CI, version bumps)
]

# Maximum allowed length for the commit message
# Applies to {message} and not the whole format
# Set to 0 for no restriction.
message_max_length = 100
